<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>斗地主</title>
  <style>
    :root {
      --bg1: #175a35;
      --bg2: #1f7143;
      --bg3: #2d8b56;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.12);
      --text: #f4fff8;
      --muted: rgba(255,255,255,0.82);
      --gold: #f7d774;
      --yellow: #facc15;
      --red: #ef4444;
      --blue: #2563eb;
      --green: #22c55e;
      --gray: #7b8290;
      --shadow: 0 10px 24px rgba(0,0,0,0.22);
      --card-shadow: 0 8px 16px rgba(0,0,0,0.24);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg1);
      font-family: "Microsoft YaHei", sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at 50% 35%, var(--bg3) 0%, var(--bg2) 44%, var(--bg1) 100%);
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      padding-top: max(12px, env(safe-area-inset-top, 0px));
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 26px;
      pointer-events: none;
    }

    .title {
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      color: #ffe7a9;
      letter-spacing: 2px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.25);
      margin-top: 4px;
    }

    .top-status {
      width: calc(100vw - 16px);
      margin: 8px auto 0;
      padding: 8px 10px;
      border-radius: 16px;
      background: rgba(0,0,0,0.14);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
      backdrop-filter: blur(4px);
    }

    .board {
      width: calc(100vw - 16px);
      margin: 10px auto 0;
      padding: 10px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.08));
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: var(--shadow);
      position: relative;
    }

    .ai-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: start;
    }

    .player-mini {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 10px 8px 8px;
      min-height: 124px;
      position: relative;
      backdrop-filter: blur(4px);
    }

    .player-mini.me-card {
      min-height: auto;
      padding: 12px 10px;
      margin-top: 10px;
    }

    .player-head {
      text-align: center;
    }

    .player-name {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 3px;
    }

    .player-count {
      font-size: 12px;
      color: var(--muted);
    }

    .turn-badge {
      margin-top: 6px;
      display: inline-block;
      font-size: 11px;
      font-weight: 800;
      color: #5b3b00;
      background: var(--yellow);
      border-radius: 999px;
      padding: 4px 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.16);
    }

    .landlord {
      position: absolute;
      top: -8px;
      right: -6px;
      background: linear-gradient(180deg, #ff5b5b, #d92d2d);
      color: white;
      font-size: 12px;
      font-weight: 800;
      border-radius: 999px;
      padding: 5px 10px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.22);
      z-index: 5;
    }

    .back-area {
      position: relative;
      height: 52px;
      margin-top: 10px;
    }

    .back-card {
      position: absolute;
      width: 34px;
      height: 48px;
      border-radius: 8px;
      background: linear-gradient(135deg, #b91c1c 0%, #ef4444 50%, #991b1b 100%);
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }

    .back-card::after {
      content: "♠";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.9);
      font-size: 16px;
      font-weight: 800;
    }

    .play-zone {
      margin-top: 12px;
      padding: 10px 10px 12px;
      border-radius: 18px;
      background: rgba(0,0,0,0.12);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .play-zone-title {
      text-align: center;
      font-size: 15px;
      font-weight: 800;
      color: #e8f9ef;
      margin-bottom: 8px;
    }

    .played-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .played-slot {
      min-height: 72px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 8px 6px 6px;
    }

    .played-slot-title {
      text-align: center;
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .played-cards {
      display: flex;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
      min-height: 46px;
      align-items: center;
    }

    .show-card {
      width: 38px;
      height: 54px;
      border-radius: 8px;
      background: linear-gradient(180deg, #fff, #f4f4f5);
      color: #111827;
      font-size: 12px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: var(--card-shadow);
      border: 1px solid #d1d5db;
      padding: 2px;
      animation: popIn .2s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(8px) scale(.94); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .me-info {
      width: calc(100vw - 16px);
      margin: 10px auto 0;
    }

    .me-card {
      text-align: center;
    }

    .play-type {
      margin-top: 8px;
      text-align: center;
      font-size: 13px;
      color: #ddeeff;
      font-weight: 700;
    }

    .hand-wrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(106px + var(--safe-bottom));
      height: 138px;
      padding: 0 8px;
      z-index: 12;
    }

    .hand-area {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .my-card {
      position: absolute;
      width: 44px;
      height: 64px;
      border-radius: 9px;
      background: linear-gradient(180deg, #ffffff 0%, #f3f4f6 100%);
      border: 1px solid #d1d5db;
      box-shadow: var(--card-shadow);
      color: #111827;
      font-size: 11px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4px;
      user-select: none;
      transition: top .14s ease, transform .14s ease, box-shadow .14s ease, border-color .14s ease;
    }

    .my-card.selected {
      border: 2px solid #3b82f6;
      background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
      box-shadow: 0 12px 18px rgba(0,0,0,0.28);
    }

    .controls {
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: calc(10px + var(--safe-bottom));
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 12px 10px;
      font-size: 15px;
      font-weight: 800;
      color: white;
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
    }

    .btn-start {
      background: linear-gradient(180deg, #22c55e, #16a34a);
    }

    .btn-play {
      background: linear-gradient(180deg, #3b82f6, #2563eb);
    }

    .btn-pass,
    .btn-refresh {
      background: linear-gradient(180deg, #8b93a1, #6b7280);
    }

    .log-toggle {
      position: fixed;
      left: 10px;
      bottom: calc(108px + var(--safe-bottom));
      z-index: 21;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(0,0,0,0.34);
      color: white;
      backdrop-filter: blur(4px);
    }

    .log {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: calc(160px + var(--safe-bottom));
      max-height: 180px;
      overflow-y: auto;
      display: none;
      z-index: 30;
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 12px;
      color: #eefcf5;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      backdrop-filter: blur(6px);
    }

    body.show-log .log {
      display: block;
    }

    .pass-text {
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
    }

    @media (min-width: 769px) {
      html, body { overflow: auto; }

      .app {
        min-height: 100vh;
        height: auto;
        padding-bottom: 230px;
      }

      .title {
        font-size: 32px;
        margin-top: 8px;
      }

      .top-status {
        width: min(960px, calc(100vw - 24px));
        font-size: 14px;
      }

      .board {
        width: min(960px, calc(100vw - 24px));
        padding: 16px;
      }

      .ai-row {
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }

      .player-mini,
      .player-mini.me-card {
        min-height: 166px;
        padding: 14px 12px 10px;
      }

      .player-name {
        font-size: 22px;
      }

      .player-count {
        font-size: 14px;
      }

      .back-area {
        height: 80px;
      }

      .back-card {
        width: 48px;
        height: 68px;
      }

      .back-card::after {
        font-size: 22px;
      }

      .played-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .played-slot {
        min-height: 124px;
        padding: 12px 8px 10px;
      }

      .played-slot-title {
        font-size: 14px;
      }

      .played-cards {
        min-height: 82px;
        gap: 6px;
      }

      .show-card {
        width: 58px;
        height: 82px;
        font-size: 15px;
        border-radius: 10px;
      }

      .play-type {
        font-size: 15px;
      }

      .hand-wrap {
        left: 50%;
        transform: translateX(-50%);
        width: min(1100px, calc(100vw - 24px));
        bottom: 110px;
        height: 160px;
      }

      .my-card {
        width: 60px;
        height: 86px;
        font-size: 15px;
        border-radius: 12px;
        padding: 6px;
      }

      .controls {
        left: 50%;
        transform: translateX(-50%);
        width: min(580px, calc(100vw - 24px));
        grid-template-columns: repeat(4, 1fr);
        bottom: 18px;
      }

      .log-toggle {
        left: 16px;
        bottom: 18px;
      }

      .log {
        left: 16px;
        width: 320px;
        right: auto;
        bottom: 70px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">斗地主</div>

    <div class="top-status">
      <span id="roundText">回合：--</span>
      <span id="turnText">当前轮到：--</span>
      <span id="stateText">游戏状态：进行中</span>
    </div>

    <div class="board">
      <div class="ai-row">
        <div class="player-mini">
          <div id="landlord1"></div>
          <div class="player-head">
            <div class="player-name">电脑1</div>
            <div class="player-count" id="ai1Count">剩余 17 张</div>
            <div id="ai1Turn"></div>
          </div>
          <div class="back-area" id="ai1Backs"></div>
        </div>

        <div class="player-mini me-card">
          <div id="landlord0"></div>
          <div class="player-head">
            <div class="player-name">你</div>
            <div class="player-count" id="myCount">剩余 17 张</div>
            <div id="meTurn"></div>
          </div>
          <div class="play-type" id="playTypeText">牌型：--</div>
        </div>

        <div class="player-mini">
          <div id="landlord2"></div>
          <div class="player-head">
            <div class="player-name">电脑2</div>
            <div class="player-count" id="ai2Count">剩余 17 张</div>
            <div id="ai2Turn"></div>
          </div>
          <div class="back-area" id="ai2Backs"></div>
        </div>
      </div>

      <div class="play-zone">
        <div class="play-zone-title">本轮出牌区</div>

        <div class="played-grid">
          <div class="played-slot">
            <div class="played-slot-title">电脑1</div>
            <div class="played-cards" id="playedLeft"></div>
          </div>

          <div class="played-slot">
            <div class="played-slot-title">你</div>
            <div class="played-cards" id="playedMid"></div>
          </div>

          <div class="played-slot">
            <div class="played-slot-title">电脑2</div>
            <div class="played-cards" id="playedRight"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="hand-wrap">
      <div class="hand-area" id="handArea"></div>
    </div>

    <div class="controls">
      <button class="btn-start" id="btnStart">开始游戏</button>
      <button class="btn-play" id="btnPlay">出牌</button>
      <button class="btn-pass" id="btnPass">过牌</button>
      <button class="btn-refresh" id="btnRefresh">刷新</button>
    </div>

    <button class="log-toggle" id="logToggle">日志</button>
    <div class="log" id="log"></div>
  </div>

  <script src="./game.js"></script>
  <script>
    let wasmModule = null;
    let gameState = null;
    let prevState = null;
    let selectedIndices = new Set();

    const handArea = document.getElementById("handArea");
    const logBox = document.getElementById("log");
    const logToggle = document.getElementById("logToggle");

    function appendLog(text) {
      const time = new Date().toLocaleTimeString();
      logBox.textContent += `[${time}] ${text}\n`;
      logBox.scrollTop = logBox.scrollHeight;
    }

    function playerName(index) {
      return index === 0 ? "你" : index === 1 ? "电脑1" : index === 2 ? "电脑2" : "无";
    }

    function playTypeName(type) {
      const map = {
        0: "过牌",
        1: "单张",
        2: "对子",
        3: "三张",
        4: "三带一",
        5: "三带二",
        6: "顺子",
        7: "炸弹",
        8: "王炸"
      };
      return map[type] || "未知";
    }

    function clearPlayedAreas() {
      ["playedLeft", "playedMid", "playedRight"].forEach(id => {
        const box = document.getElementById(id);
        box.innerHTML = "";
      });
    }

    function getState() {
      const ptr = wasmModule._game_get_state_json();
      return JSON.parse(wasmModule.UTF8ToString(ptr));
    }

    function updateState() {
      prevState = gameState;
      gameState = getState();
      return gameState;
    }

    function setTurn(id, active) {
      document.getElementById(id).innerHTML = active
        ? '<span class="turn-badge">出牌中</span>'
        : '';
    }

    function setLandlord(index) {
      for (let i = 0; i < 3; i++) {
        const el = document.getElementById("landlord" + i);
        if (!el) continue;
        el.innerHTML = i === index ? '<span class="landlord">地主</span>' : '';
      }
    }

    function renderBackCards(containerId, count) {
      const box = document.getElementById(containerId);
      box.innerHTML = "";
      const showCount = Math.min(count, window.innerWidth >= 769 ? 10 : 7);
      const step = window.innerWidth >= 769 ? 8 : 5;

      for (let i = 0; i < showCount; i++) {
        const div = document.createElement("div");
        div.className = "back-card";
        div.style.left = (i * step) + "px";
        div.style.top = (i % 2) + "px";
        box.appendChild(div);
      }
    }

    function splitCards(text) {
      if (!text || text === "过牌") return [];
      return text.trim().split(/\s+/);
    }

    function renderPlayedArea(playerIndex, text) {
      const map = {
        0: document.getElementById("playedMid"),
        1: document.getElementById("playedLeft"),
        2: document.getElementById("playedRight")
      };

      const target = map[playerIndex];
      if (!target) return;

      target.innerHTML = "";

      if (!text || text === "过牌") {
        return;
      }

      const cards = splitCards(text);
      if (!cards.length) return;

      cards.forEach(card => {
        const div = document.createElement("div");
        div.className = "show-card";
        div.textContent = card;
        target.appendChild(div);
      });
    }

    function renderStatus(state) {
      document.getElementById("myCount").textContent = `剩余 ${state.myCardCount} 张`;
      document.getElementById("ai1Count").textContent = `剩余 ${state.ai1CardCount} 张`;
      document.getElementById("ai2Count").textContent = `剩余 ${state.ai2CardCount} 张`;

      setTurn("meTurn", state.currentPlayer === 0);
      setTurn("ai1Turn", state.currentPlayer === 1);
      setTurn("ai2Turn", state.currentPlayer === 2);

      setLandlord(state.landlordIndex);

      renderBackCards("ai1Backs", state.ai1CardCount);
      renderBackCards("ai2Backs", state.ai2CardCount);

      document.getElementById("roundText").textContent = `回合：${state.gameRound}`;
      document.getElementById("turnText").textContent = `当前轮到：${playerName(state.currentPlayer)}`;
      document.getElementById("stateText").textContent = `游戏状态：${state.gameOver ? "已结束" : "进行中"}`;
      document.getElementById("playTypeText").textContent = `牌型：${playTypeName(state.lastPlayType)}`;

      if (state.lastPlayer === -1 || state.lastPlayType === 0) {
        clearPlayedAreas();
      } else {
        renderPlayedArea(state.lastPlayer, state.lastPlayedText);
      }
    }

    function getCardMetrics() {
      if (window.innerWidth >= 769) {
        return {
          cardWidth: 60,
          baseTop: 28,
          selectedTop: 6,
          maxOverlap: 34,
          minOverlap: 18
        };
      }

      return {
        cardWidth: 44,
        baseTop: 34,
        selectedTop: 8,
        maxOverlap: 22,
        minOverlap: 10
      };
    }

    function renderHand(state) {
      handArea.innerHTML = "";
      if (!state.hand || !state.hand.length) return;

      const metrics = getCardMetrics();
      const cardWidth = metrics.cardWidth;
      const overlap = Math.min(
        metrics.maxOverlap,
        Math.max(
          metrics.minOverlap,
          Math.floor((handArea.clientWidth - cardWidth) / Math.max(1, state.hand.length - 1))
        )
      );

      const totalWidth = cardWidth + overlap * (state.hand.length - 1);
      const startLeft = Math.max(0, Math.floor((handArea.clientWidth - totalWidth) / 2));

      const invalid = [];
      selectedIndices.forEach(index => {
        if (index >= state.hand.length) invalid.push(index);
      });
      invalid.forEach(index => selectedIndices.delete(index));

      state.hand.forEach((cardName, index) => {
        const div = document.createElement("div");
        div.className = "my-card" + (selectedIndices.has(index) ? " selected" : "");
        div.style.left = (startLeft + index * overlap) + "px";
        div.style.top = selectedIndices.has(index)
          ? metrics.selectedTop + "px"
          : metrics.baseTop + "px";
        div.textContent = cardName;

        div.onclick = () => {
          if (!gameState || gameState.currentPlayer !== 0 || gameState.gameOver) return;

          if (selectedIndices.has(index)) selectedIndices.delete(index);
          else selectedIndices.add(index);

          renderHand(gameState);
        };

        handArea.appendChild(div);
      });
    }

    function renderAll() {
      updateState();
      renderStatus(gameState);
      renderHand(gameState);
    }

    function mallocIntArray(values) {
      const bytes = values.length * 4;
      const ptr = wasmModule._malloc(bytes);
      wasmModule.HEAP32.set(values, ptr >> 2);
      return ptr;
    }

    function describeAIAction(before, after) {
      if (!before || !after) return null;

      let actor = null;
      if (before.currentPlayer === 1) actor = "电脑1";
      else if (before.currentPlayer === 2) actor = "电脑2";
      if (!actor) return null;

      if (after.lastPlayer === before.currentPlayer) {
        return `${actor} 出了：${after.lastPlayedText || "未知牌面"}（${playTypeName(after.lastPlayType)}）`;
      }

      return `${actor} 过牌。`;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function autoRunAI() {
      let guard = 0;
      while (!gameState.gameOver && gameState.currentPlayer !== 0 && guard < 50) {
        const before = JSON.parse(JSON.stringify(gameState));

        wasmModule._game_ai_step();
        updateState();
        renderStatus(gameState);
        renderHand(gameState);

        const msg = describeAIAction(before, gameState);
        if (msg) appendLog(msg);

        if (before.currentPlayer === 1 || before.currentPlayer === 2) {
          if (gameState.lastPlayer === before.currentPlayer) {
            renderPlayedArea(before.currentPlayer, gameState.lastPlayedText);
          } else {
            renderPlayedArea(before.currentPlayer, "过牌");
          }
        }

        guard++;
        await sleep(window.innerWidth >= 769 ? 680 : 520);
      }
    }

    async function startGame() {
      if (!wasmModule) {
        appendLog("WASM 模块还没加载好。");
        return;
      }

      wasmModule._game_init();
      selectedIndices.clear();
      prevState = null;
      clearPlayedAreas();

      renderAll();
      appendLog("新游戏开始。");

      if (gameState.landlordIndex >= 0) {
        appendLog(`${playerName(gameState.landlordIndex)} 是地主。`);
      }

      if (gameState.currentPlayer !== 0 && !gameState.gameOver) {
        appendLog(`${playerName(gameState.currentPlayer)} 先手，自动运行中。`);
        await autoRunAI();
      }

      if (gameState.currentPlayer === 0 && !gameState.gameOver) {
        appendLog("轮到你了。");
      }
    }

    async function playSelected() {
      if (!gameState) return appendLog("请先开始游戏。");
      if (gameState.gameOver) return appendLog("游戏已经结束。");
      if (gameState.currentPlayer !== 0) return appendLog("还没轮到你。");

      const selected = Array.from(selectedIndices).sort((a, b) => a - b);
      if (!selected.length) return appendLog("你还没选牌。");

      const ptr = mallocIntArray(selected);
      const result = wasmModule._game_play(ptr, selected.length);
      wasmModule._free(ptr);

      if (!result) {
        renderAll();
        return appendLog("出牌失败：牌型不合法，或者压不过上家。");
      }

      selectedIndices.clear();
      renderAll();
      appendLog(`你出了：${gameState.lastPlayedText || "未知牌面"}（${playTypeName(gameState.lastPlayType)}）`);

      if (!gameState.gameOver && gameState.currentPlayer !== 0) {
        await autoRunAI();
      }

      if (gameState.gameOver) appendLog("游戏结束。");
      else if (gameState.currentPlayer === 0) appendLog("又轮到你了。");
    }

    async function passTurn() {
      if (!gameState) return appendLog("请先开始游戏。");
      if (gameState.gameOver) return appendLog("游戏已经结束。");
      if (gameState.currentPlayer !== 0) return appendLog("还没轮到你过牌。");

      const result = wasmModule._game_pass();
      if (!result) {
        renderAll();
        return appendLog("过牌失败：新一轮第一个出牌的人不能过。");
      }

      selectedIndices.clear();
      renderAll();
      renderPlayedArea(0, "过牌");
      appendLog("你选择了过牌。");

      if (!gameState.gameOver && gameState.currentPlayer !== 0) {
        await autoRunAI();
      }

      if (gameState.gameOver) appendLog("游戏结束。");
      else if (gameState.currentPlayer === 0) appendLog("又轮到你了。");
    }

    function bindButtons() {
      document.getElementById("btnStart").onclick = () => startGame();
      document.getElementById("btnPlay").onclick = () => playSelected();
      document.getElementById("btnPass").onclick = () => passTurn();
      document.getElementById("btnRefresh").onclick = () => {
        if (!wasmModule) return;
        renderAll();
        appendLog("界面已刷新。");
      };

      logToggle.onclick = () => {
        document.body.classList.toggle("show-log");
      };
    }

    async function loadModule() {
      if (typeof GameModule === "function") {
        wasmModule = await GameModule();
      } else if (typeof Module !== "undefined") {
        wasmModule = await Module;
      } else {
        throw new Error("没有找到 game.js 导出的模块。");
      }

      bindButtons();
      appendLog("WASM 模块加载完成。先点“开始游戏”。");
    }

    loadModule().catch(err => {
      console.error(err);
      appendLog("加载失败：" + err.message);
    });

    window.addEventListener("resize", () => {
      if (gameState) {
        renderStatus(gameState);
        renderHand(gameState);
      }
    });
  </script>
</body>
</html>
